<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Your Visibility Report | GeoNeo AI</title>
  <meta name="robots" content="noindex" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>G</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;700&family=DM+Sans:wght@400;500;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
  <style>
    .report-wrap { max-width: 760px; margin: 0 auto; padding: 2rem 1rem 4rem; }
    .report-header { text-align: center; margin-bottom: 2.5rem; }
    .report-header h1 { font-size: clamp(1.5rem, 4vw, 2.2rem); margin: 0 0 0.5rem; }
    .report-header p { color: var(--muted); font-size: 0.95rem; }
    .score-ring { width: 140px; height: 140px; margin: 1.5rem auto; position: relative; }
    .score-ring svg { width: 100%; height: 100%; transform: rotate(-90deg); }
    .score-ring circle { fill: none; stroke-width: 10; }
    .score-ring .bg { stroke: var(--line); }
    .score-ring .fg { stroke: var(--brand); stroke-linecap: round; transition: stroke-dashoffset 1s ease; }
    .score-ring .score-label { position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center; }
    .score-ring .score-num { font-family: 'Space Grotesk', sans-serif; font-size: 2.2rem; font-weight: 700; color: var(--ink); }
    .score-ring .score-of { font-size: 0.8rem; color: var(--muted); }
    .score-grade { text-align: center; font-size: 1rem; font-weight: 600; margin-bottom: 2rem; }
    .score-grade.good { color: var(--brand); }
    .score-grade.ok { color: #ffa657; }
    .score-grade.bad { color: #ff6b6b; }
    .report-section { margin-bottom: 2rem; }
    .report-section h2 { font-size: 1.15rem; margin: 0 0 0.75rem; padding-bottom: 0.5rem; border-bottom: 1px solid var(--line); }
    .finding { padding: 0.75rem 0; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .finding:last-child { border-bottom: none; }
    .finding-status { display: inline-block; font-size: 0.75rem; font-weight: 700; padding: 0.2rem 0.5rem; border-radius: 4px; margin-right: 0.5rem; text-transform: uppercase; }
    .finding-status.pass { background: rgba(0,229,160,0.12); color: var(--brand); }
    .finding-status.fix { background: rgba(255,107,107,0.12); color: #ff6b6b; }
    .finding-status.warn { background: rgba(255,166,87,0.12); color: #ffa657; }
    .finding-text { font-size: 0.92rem; color: var(--ink); }
    .finding-impact { font-size: 0.82rem; color: var(--muted); margin-top: 0.25rem; }
    .fix-card { background: var(--surface); border: 1px solid var(--line); border-radius: 12px; padding: 1rem 1.2rem; margin-bottom: 0.75rem; }
    .fix-card .fix-num { font-size: 0.75rem; font-weight: 700; color: var(--brand); text-transform: uppercase; margin-bottom: 0.3rem; }
    .fix-card .fix-title { font-weight: 600; font-size: 0.95rem; margin-bottom: 0.3rem; }
    .fix-card .fix-desc { font-size: 0.88rem; color: var(--muted); }
    .competitor-table { width: 100%; border-collapse: collapse; font-size: 0.88rem; }
    .competitor-table th { text-align: left; padding: 0.6rem 0.5rem; border-bottom: 2px solid var(--line); color: var(--muted); font-size: 0.78rem; text-transform: uppercase; }
    .competitor-table td { padding: 0.6rem 0.5rem; border-bottom: 1px solid rgba(255,255,255,0.04); }
    .competitor-table .strength-bar { display: inline-block; height: 6px; border-radius: 3px; background: var(--brand); min-width: 8px; }
    .category-scores { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 0.75rem; margin-bottom: 1.5rem; }
    .cat-score { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 0.75rem; text-align: center; }
    .cat-score .cat-val { font-family: 'Space Grotesk', sans-serif; font-size: 1.4rem; font-weight: 700; }
    .cat-score .cat-label { font-size: 0.75rem; color: var(--muted); margin-top: 0.2rem; }
    .cta-box { text-align: center; background: var(--surface); border: 1px solid var(--line); border-radius: 16px; padding: 2rem; margin-top: 2.5rem; }
    .cta-box h3 { margin: 0 0 0.5rem; }
    .cta-box p { color: var(--muted); font-size: 0.9rem; margin: 0 0 1rem; }
    .loading-state { text-align: center; padding: 4rem 1rem; }
    .loading-state .spinner { width: 40px; height: 40px; border: 4px solid var(--line); border-top-color: var(--brand); border-radius: 50%; animation: spin 0.8s linear infinite; margin: 0 auto 1rem; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .loading-state p { color: var(--muted); }
    .error-state { text-align: center; padding: 3rem 1rem; }
    .error-state h2 { color: #ff6b6b; }
    .error-state p { color: var(--muted); }
    @media (max-width: 600px) {
      .swot-grid { grid-template-columns: 1fr !important; }
      .channel-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
<body>
  <header class="site-header container">
    <a class="brand" href="index.html" aria-label="GeoNeo AI home">
      <span class="brand-mark" aria-hidden="true">G</span>
      <span class="brand-text">GeoNeo AI</span>
    </a>
    <a class="btn btn-sm btn-ghost" href="index.html">← New Audit</a>
  </header>

  <main class="report-wrap" id="reportMain">
    <div class="loading-state" id="loadingState">
      <div class="spinner"></div>
      <p id="loadingMsg">Scanning your business visibility...</p>
    </div>
  </main>

  <script>
  (function() {
    var params = new URLSearchParams(window.location.search);
    var urlInput = params.get('url') || '';
    var city = params.get('city') || '';
    var state = params.get('state') || '';
    var industry = params.get('industry') || '';
    var inputMode = params.get('mode') || ''; // 'website' or 'industry'

    // Parse natural language input like "branson mo tow" into city/state/industry
    if (urlInput && !city && !/^(https?:\/\/|www\.)|(\.\w{2,})/.test(urlInput)) {
      var parsed = parseNaturalInput(urlInput);
      city = parsed.city || city;
      state = parsed.state || state;
      industry = parsed.industry || industry;
      urlInput = parsed.industry || urlInput;
    }

    if (!urlInput && !industry && !city) {
      showError('No business information provided.', 'Go back and enter your website or business name.');
      return;
    }

    var isUrl = /^(https?:\/\/|www\.)|(\.\w{2,})/.test(urlInput);
    var apiParams = new URLSearchParams();
    apiParams.set('packageView', 'full_data');
    apiParams.set('internalMode', 'true');

    if (inputMode === 'industry' || (!isUrl && inputMode !== 'website')) {
      apiParams.set('queryType', 'market');
      if (urlInput && !isUrl) apiParams.set('businessName', urlInput);
      var effectiveIndustry = industry || urlInput || '';
      if (effectiveIndustry) apiParams.set('industry', effectiveIndustry);
    } else {
      apiParams.set('url', urlInput);
      apiParams.set('queryType', 'website');
    }
    if (city) apiParams.set('city', city);
    if (state) apiParams.set('state', state);
    if (industry) apiParams.set('industry', industry);

    var msgs = [
      'Checking Google Search rankings...',
      'Scanning Google Maps presence...',
      'Checking directory listings...',
      'Analyzing AI search visibility...',
      'Comparing against local competitors...',
      'Building your report...'
    ];
    var msgIdx = 0;
    var msgInterval = setInterval(function() {
      msgIdx++;
      if (msgIdx < msgs.length) {
        document.getElementById('loadingMsg').textContent = msgs[msgIdx];
      }
    }, 8000);

    var mode = ''; // set in renderReport, used by gradeFromScore

    var US_STATES = {al:'alabama',ak:'alaska',az:'arizona',ar:'arkansas',ca:'california',co:'colorado',ct:'connecticut',de:'delaware',fl:'florida',ga:'georgia',hi:'hawaii',id:'idaho',il:'illinois',in:'indiana',ia:'iowa',ks:'kansas',ky:'kentucky',la:'louisiana',me:'maine',md:'maryland',ma:'massachusetts',mi:'michigan',mn:'minnesota',ms:'mississippi',mo:'missouri',mt:'montana',ne:'nebraska',nv:'nevada',nh:'new hampshire',nj:'new jersey',nm:'new mexico',ny:'new york',nc:'north carolina',nd:'north dakota',oh:'ohio',ok:'oklahoma',or:'oregon',pa:'pennsylvania',ri:'rhode island',sc:'south carolina',sd:'south dakota',tn:'tennessee',tx:'texas',ut:'utah',vt:'vermont',va:'virginia',wa:'washington',wv:'west virginia',wi:'wisconsin',wy:'wyoming'};
    var STATE_ABBREVS = Object.keys(US_STATES);

    function parseNaturalInput(raw) {
      // Splits "branson mo tow" or "tow companies branson mo" into parts
      var words = raw.trim().split(/[\s,]+/);
      var foundState = '';
      var foundCity = '';
      var industryWords = [];

      // Find state abbreviation
      for (var i = 0; i < words.length; i++) {
        if (STATE_ABBREVS.indexOf(words[i].toLowerCase()) !== -1) {
          foundState = words[i].toUpperCase();
          words.splice(i, 1);
          break;
        }
      }

      // Known cities (common ones)
      var knownCities = ['branson','springfield','nixa','ozark','joplin','dallas','austin','houston','tulsa','fayetteville','rogers','bentonville','hollister','forsyth'];
      for (var j = 0; j < words.length; j++) {
        if (knownCities.indexOf(words[j].toLowerCase()) !== -1) {
          foundCity = words[j].charAt(0).toUpperCase() + words[j].slice(1).toLowerCase();
          words.splice(j, 1);
          break;
        }
      }

      // If no known city found but we have a state, the word before the state might be the city
      if (!foundCity && foundState && words.length > 0) {
        // Try last remaining word as city if it's not a service keyword
        var serviceWords = ['tow','towing','plumber','plumbing','hvac','roofing','shows','dental','legal','electrician','pest','tree','garage','restoration','locksmith','auto','mechanic'];
        for (var k = words.length - 1; k >= 0; k--) {
          if (serviceWords.indexOf(words[k].toLowerCase()) === -1) {
            foundCity = words[k].charAt(0).toUpperCase() + words[k].slice(1).toLowerCase();
            words.splice(k, 1);
            break;
          }
        }
      }

      industryWords = words.filter(function(w) { return w.length > 0; });
      return {
        city: foundCity,
        state: foundState,
        industry: industryWords.join(' ')
      };
    }

    fetch('/api/audit?' + apiParams.toString())
      .then(function(r) { return r.json(); })
      .then(function(data) {
        clearInterval(msgInterval);
        if (data.error) {
          showError('Audit could not complete', data.fetchMessage || data.error);
          return;
        }
        renderReport(data);
      })
      .catch(function(err) {
        clearInterval(msgInterval);
        showError('Something went wrong', err.message || 'Please try again in a moment.');
      });

    function showError(title, msg) {
      document.getElementById('reportMain').innerHTML =
        '<div class="error-state"><h2>' + esc(title) + '</h2><p>' + esc(msg) + '</p><a class="btn btn-hot" href="index.html" style="margin-top:1rem;display:inline-block;">Try Again</a></div>';
    }

    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }

    function renderReport(data) {
      var scores = data.summaryScores || {};
      mode = data.mode || data.queryType || 'website';
      var issues = data.issues || [];
      var fixes = data.fixes || [];
      var competitors = data.competitors || [];
      var searchPos = data.searchPositioning || {};
      var input = data.input || {};
      var businessLabel = input.website || input.businessName || input.industry || urlInput;

      // For market mode, scores have different keys — normalize
      var displayScores;
      if (mode === 'market') {
        displayScores = {
          seo: scores.competitionLevel || 0,
          localPresence: scores.localBusinessVisibility || 0,
          aiVisibility: scores.opportunityScore || 0,
          technical: scores.marketActivity || 0,
          reputation: scores.leadPotential || 0,
          conversionUx: scores.directoryDominance || 0
        };
      } else {
        displayScores = {
          seo: scores.seo || 0,
          localPresence: scores.localPresence || 0,
          aiVisibility: scores.aiVisibility || 0,
          technical: scores.technical || 0,
          reputation: scores.reputation || 0,
          conversionUx: scores.conversionUx || 0
        };
      }

      var overall = computeOverall(displayScores);
      var grade = gradeFromScore(overall);

      // Detect if we have no real data (all zeros = no SERP provider)
      var hasNoData = overall === 0 && competitors.length === 0 && fixes.length === 0;

      var html = '';
      html += '<div class="report-header">';
      if (mode === 'market') {
        html += '<h1>Industry Market Report</h1>';
        html += '<p>' + esc((industry || businessLabel)) + ' in ' + esc(city || 'your area') + (state ? ', ' + esc(state) : '') + '</p>';
      } else {
        html += '<h1>Visibility Report</h1>';
        html += '<p>' + esc(businessLabel) + (city ? ' — ' + esc(city) + (state ? ', ' + esc(state) : '') : '') + '</p>';
      }
      html += '</div>';

      if (hasNoData && mode === 'market') {
        // No data scenario — show helpful message for market/industry research
        html += '<div style="text-align:center;padding:2rem;border:1px solid var(--line);border-radius:16px;margin-bottom:2rem;">';
        html += '<p style="font-size:1.3rem;margin:0 0 0.75rem;">⚠️ Limited market data available</p>';
        html += '<p style="color:var(--muted);max-width:500px;margin:0 auto 1rem;">We couldn\'t find enough businesses ranking for <strong>' + esc(businessLabel) + '</strong> in <strong>' + esc(city || 'your area') + '</strong>. This usually means:</p>';
        html += '<ul style="text-align:left;max-width:400px;margin:0 auto;color:var(--muted);font-size:0.9rem;">';
        html += '<li>Try a broader industry term (e.g., "plumbing" instead of "drain cleaning")</li>';
        html += '<li>Try a larger nearby city if your area is very small</li>';
        html += '<li>This industry may have very few businesses online in this area — which could be a big opportunity</li>';
        html += '</ul>';
        html += '</div>';
        html += '<div class="cta-box"><h3>Try a different search</h3><p>Broaden the industry term or try a nearby city with more businesses.</p><a class="btn btn-hot" href="index.html">Run Another Audit</a></div>';
        document.getElementById('reportMain').innerHTML = html;
        return;
      }

      // === MARKET OVERVIEW (industry mode only — leads the report) ===
      if (mode === 'market') {
        var mktOpp = data.marketOpportunity || {};
        var mktState = mktOpp.marketState || {};
        var indAnalysis = data.industryAnalysis || {};
        var difficulty = indAnalysis.difficulty || {};
        var opportunities = indAnalysis.opportunities || {};
        var strategy = indAnalysis.strategy || {};
        var marketLabel = esc((industry || businessLabel)) + ' in ' + esc(city || 'your area') + (state ? ', ' + esc(state) : '');

        // --- Difficulty + Local vs National ---
        html += '<div class="report-section" style="background:var(--surface);border:1px solid var(--line);border-radius:16px;padding:1.5rem;margin-bottom:2rem;">';
        html += '<h2 style="border:none;padding:0;margin:0 0 1rem;">📊 Market Overview</h2>';

        // Difficulty badge
        var diffLabel = mktState.marketDifficultyLabel || 'Unknown';
        var diffColor = diffLabel === 'Wide Open' || diffLabel === 'Easy' ? 'var(--brand)' : (diffLabel === 'Moderate' ? '#ffa657' : '#ff6b6b');
        html += '<div style="display:flex;align-items:center;gap:0.75rem;margin-bottom:1rem;flex-wrap:wrap;">';
        html += '<span style="font-weight:700;font-size:1rem;">Difficulty:</span>';
        html += '<span style="background:' + diffColor + ';color:#0a0f1a;font-weight:700;padding:0.3rem 0.8rem;border-radius:6px;font-size:0.9rem;">' + esc(diffLabel) + '</span>';
        html += '<span style="color:var(--muted);font-size:0.85rem;">Timeline to first page: ' + esc(mktState.estimatedTimeline || '—') + '</span>';
        html += '</div>';

        // Local vs National comparison
        html += '<div style="margin-bottom:1rem;padding:0.75rem;border:1px solid var(--line);border-radius:10px;">';
        html += '<div style="font-weight:600;font-size:0.9rem;margin-bottom:0.4rem;">🏠 Local vs. National Comparison</div>';
        html += '<p style="color:var(--muted);font-size:0.88rem;margin:0;">' + esc(mktState.nationalComparison || 'Not enough data to compare against national averages.') + '</p>';
        html += '</div>';

        // Domination potential
        var domPotential = mktState.dominationPotential || 'Unknown';
        var domColor = domPotential === 'Very High' || domPotential === 'High' ? 'var(--brand)' : (domPotential === 'Moderate' ? '#ffa657' : '#ff6b6b');
        html += '<div style="display:flex;align-items:center;gap:0.5rem;margin-bottom:0.5rem;">';
        html += '<span style="font-size:0.9rem;font-weight:600;">Can you dominate this market?</span>';
        html += '<span style="color:' + domColor + ';font-weight:700;">' + esc(domPotential) + ' potential</span>';
        html += '</div>';
        html += '</div>';

        // --- SWOT-style Analysis ---
        html += '<div class="report-section">';
        html += '<h2>💡 Market Strengths, Weaknesses & Opportunities</h2>';
        html += '<div class="swot-grid" style="display:grid;grid-template-columns:1fr 1fr;gap:0.75rem;margin-bottom:1rem;">';

        // Strengths (of the market — what's working for current players)
        var strengths = [];
        if ((displayScores.localPresence || 0) >= 55) strengths.push('Local businesses are actively showing up in Maps');
        if ((displayScores.technical || 0) >= 60) strengths.push('Active market with real customer demand');
        if (competitors.length >= 3) strengths.push(competitors.length + ' businesses competing for visibility');
        if (!strengths.length) strengths.push('Market has some established players');
        html += '<div style="border:1px solid var(--line);border-radius:10px;padding:1rem;">';
        html += '<div style="font-weight:700;color:var(--brand);font-size:0.85rem;margin-bottom:0.4rem;">STRENGTHS (current market)</div>';
        strengths.forEach(function(s) { html += '<div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.25rem;">• ' + esc(s) + '</div>'; });
        html += '</div>';

        // Weaknesses (gaps you can exploit)
        var weaknesses = [];
        if ((mktState.averageWebsiteQualityEstimate || 0) < 55) weaknesses.push('Most competitor websites are low quality');
        if ((displayScores.conversionUx || 0) >= 40) weaknesses.push('Directories outrank actual businesses');
        if ((displayScores.aiVisibility || 0) < 40) weaknesses.push('Nobody is set up for AI search yet');
        var weakComps = opportunities.weakCompetitorsInTop10 || [];
        if (weakComps.length) weaknesses.push(weakComps.length + ' weak competitors still ranking in top 10');
        if (!weaknesses.length) weaknesses.push('Some competitors have outdated websites');
        html += '<div style="border:1px solid var(--line);border-radius:10px;padding:1rem;">';
        html += '<div style="font-weight:700;color:#ff6b6b;font-size:0.85rem;margin-bottom:0.4rem;">WEAKNESSES (gaps to exploit)</div>';
        weaknesses.forEach(function(w) { html += '<div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.25rem;">• ' + esc(w) + '</div>'; });
        html += '</div>';

        // Opportunities
        var opps = [];
        var keyOpps = opportunities.keyOpportunities || [];
        keyOpps.forEach(function(o) { if (o) opps.push(o); });
        if ((displayScores.aiVisibility || 0) < 50) opps.push('First to optimize for AI search wins big');
        if (!opps.length) opps.push('Room to differentiate with better content and reviews');
        html += '<div style="border:1px solid var(--line);border-radius:10px;padding:1rem;">';
        html += '<div style="font-weight:700;color:#ffa657;font-size:0.85rem;margin-bottom:0.4rem;">OPPORTUNITIES</div>';
        opps.slice(0, 3).forEach(function(o) { html += '<div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.25rem;">• ' + esc(o) + '</div>'; });
        html += '</div>';

        // Threats
        var threats = [];
        if ((displayScores.seo || 0) >= 70) threats.push('Strong incumbents are actively investing in SEO');
        if (competitors.length && competitors[0].strengthScore >= 75) threats.push('Market leader (' + esc(competitors[0].companyName || competitors[0].domain) + ') has strong visibility');
        if ((mktState.localCompetitionDensity || 0) >= 60) threats.push('High density of competing businesses');
        if (!threats.length) threats.push('New competitors could enter at any time');
        html += '<div style="border:1px solid var(--line);border-radius:10px;padding:1rem;">';
        html += '<div style="font-weight:700;color:#ff6b6b;font-size:0.85rem;margin-bottom:0.4rem;">THREATS</div>';
        threats.forEach(function(t) { html += '<div style="font-size:0.85rem;color:var(--muted);margin-bottom:0.25rem;">• ' + esc(t) + '</div>'; });
        html += '</div>';

        html += '</div>'; // end grid
        html += '</div>'; // end section

        // --- What It Takes to Be #1 ---
        html += '<div class="report-section" style="background:rgba(0,229,160,0.04);border:1px solid rgba(0,229,160,0.2);border-radius:14px;padding:1.5rem;margin-bottom:2rem;">';
        html += '<h2 style="border:none;padding:0;margin:0 0 0.75rem;color:var(--brand);">🏆 What It Takes to Be #1</h2>';
        html += '<p style="color:var(--muted);font-size:0.88rem;margin:0 0 1rem;">To dominate ' + marketLabel + ', a business needs:</p>';
        html += '<div style="display:grid;gap:0.5rem;">';

        var toBeFirst = [];
        if (competitors.length && competitors[0]) {
          var leader = competitors[0];
          if ((leader.mapPackAppearances || 0) > 0) toBeFirst.push('A fully optimized Google Business Profile with ' + (leader.reviews ? leader.reviews + '+ reviews' : 'strong reviews') + ' to own the Maps results');
          if ((leader.searchAppearances || 0) > 1) toBeFirst.push('A website that ranks for multiple search terms (the current leader shows up in ' + leader.searchAppearances + ' different searches)');
          if (leader.hasStructuredData) toBeFirst.push('Structured content that AI tools can read and recommend');
        }
        if (!toBeFirst.length || toBeFirst.length < 3) {
          toBeFirst.push('A complete Google Business Profile with consistent reviews coming in weekly');
          toBeFirst.push('A website with dedicated pages for each service you offer in this area');
          toBeFirst.push('Content structured so AI search tools (ChatGPT, Google AI) recommend you');
        }
        toBeFirst.push('Consistent business information across all directories and listings');
        toBeFirst.slice(0, 4).forEach(function(item, idx) {
          html += '<div style="display:flex;align-items:flex-start;gap:0.5rem;font-size:0.88rem;">';
          html += '<span style="min-width:1.4rem;height:1.4rem;border-radius:50%;background:var(--brand);color:#0a0f1a;display:grid;place-items:center;font-size:0.7rem;font-weight:700;">' + (idx + 1) + '</span>';
          html += '<span style="color:var(--ink);">' + esc(item) + '</span></div>';
        });
        html += '</div></div>';

        // --- GBP vs SEO vs GEO Breakdown ---
        html += '<div class="report-section">';
        html += '<h2>📍 GBP vs. SEO vs. GEO — Where the Visibility Lives</h2>';
        html += '<p style="color:var(--muted);font-size:0.88rem;margin-bottom:1rem;">Three channels drive customers to local businesses. Here\'s how this market breaks down:</p>';

        // Calculate averages from competitors
        var totalGBP = 0, totalSEO = 0, totalGEO = 0, compCount = Math.max(competitors.length, 1);
        competitors.forEach(function(c) {
          totalGBP += (c.mapPackAppearances || 0);

        html += '<div style="font-weight:700;font-size:0.85rem;">Website SEO</div>';
        html += '<div style="font-size:0.75rem;color:var(--muted);margin-bottom:0.5rem;">(Organic Google Rankings)</div>';
        html += '<div style="font-size:1.3rem;font-weight:700;color:' + (seoAvg >= 50 ? 'var(--brand)' : '#ffa657') + ';">' + seoAvg + '/100</div>';

        html += '<div style="font-weight:700;font-size:0.85rem;">GEO (AI Search)</div>';

        html += '<div style="font-size:1.3rem;font-weight:700;color:' + (geoAvg >= 50 ? 'var(--brand)' : '#ffa657') + ';">' + geoAvg + '/100</div>';
        html += '<div style="font-size:0.75rem;color:var(--muted);">' + (geoAvg >= 40 ? 'Some AI readiness detected' : 'Wide open — almost nobody is ready') + '</div>';
        html += '</div>';

        html += '</div>'; // end grid

        // Comparison to national
        html += '<div style="font-size:0.85rem;color:var(--muted);padding:0.6rem;border-top:1px solid var(--line);">';
        html += '<strong style="color:var(--ink);">vs. National:</strong> ';
        if (gbpAvg < 40 && seoAvg < 40) {
          html += 'This local market is significantly behind national averages across all three channels. A business that invests in any one of these will stand out immediately.';
        } else if (geoAvg < 30) {
          html += 'GBP and SEO are somewhat competitive locally, but AI search (GEO) is virtually untouched. Nationally, early adopters are already winning AI citations — this market hasn\'t caught up yet.';
        } else {
          html += 'This market is keeping pace with national trends in traditional search, but there\'s still room to lead in AI visibility and local proof.';
        }
        html += '</div>';
        html += '</div>'; // end section
      }
      // === END MARKET OVERVIEW ===

      // Overall score ring
      html += renderScoreRing(overall);
      html += '<div class="score-grade ' + grade.cls + '">' + esc(grade.label) + '</div>';

      // Category scores
      html += '<div class="category-scores">';
      if (mode === 'market') {
        html += catScore(displayScores.seo, 'Competition', 'higher = harder to break in');

          html += '<p style="color:var(--muted);font-size:0.88rem;margin-bottom:1rem;">These are the changes that will have the biggest impact on your visibility. Listed in priority order.</p>';

        }
        html += '</div>';
      }

      // Competitor comparison

          html += '<h2>Who Dominates This Market</h2>';
          html += '<p style="color:var(--muted);font-size:0.88rem;margin-bottom:1rem;">These are the businesses currently capturing the most search visibility for ' + esc(industry || 'this industry') + ' in ' + esc(city || 'this area') + '.</p>';
        } else {

      // If market mode has issues from the API, show them as findings too

          html += '<div class="finding"><span class="finding-status ' + sev + '">' + (sev === 'fix' ? '✗' : (sev === 'warn' ? '⚠' : '✓')) + '</span>';
          html += '<span class="finding-text">' + esc(iss.title || '') + '</span>';
          html += '<div class="finding-impact">' + esc(iss.description || '') + '</div></div>';
        });
        html += '</div>';
      }

      // Deep audit placeholder (loads async)
      html += '<div id="deepAuditSection"></div>';

      // CTA
      html += '<div class="cta-box">';
      if (mode === 'market') {
        html += '<h3>Ready to dominate this market?</h3>';
        html += '<p>We can build the visibility strategy to put you at the top of this industry in ' + esc(city || 'your area') + '.</p>';
      } else {
        html += '<h3>Want help fixing these issues?</h3>';
        html += '<p>We can implement these fixes for you or guide your web team through them.</p>';
      }
      html += '<a class="btn btn-hot" href="mailto:hello@geoneo.ai?subject=' + encodeURIComponent((mode === 'market' ? 'Market Report: ' : 'Visibility Audit: ') + businessLabel) + '&body=I%20just%20ran%20a%20report%20and%20would%20like%20help.">Get Started</a>';
      html += '</div>';

      // On website audits, show button to also run industry report
      if (mode !== 'market' && (industry || city)) {

        if (industry) indParams.set('industry', industry);
        if (city) indParams.set('city', city);
        if (state) indParams.set('state', state);
        html += '<div style="text-align:center;margin-top:1.5rem;">';
        html += '<a href="report.html?' + indParams.toString() + '" style="color:var(--brand);font-weight:600;font-size:0.9rem;">📊 Also see: Industry Market Report for ' + esc(industry || 'your industry') + ' in ' + esc(city || 'your area') + ' →</a>';
        html += '</div>';
      }

      document.getElementById('reportMain').innerHTML = html;

      // Async: run deep audit for dollar estimates
      if (isUrl) {
        var deepParams = new URLSearchParams();
        deepParams.set('url', urlInput);
        if (city) deepParams.set('city', city);
        if (state) deepParams.set('state', state);
        if (industry) deepParams.set('industry', industry);
        fetch('/api/audit-deep?' + deepParams.toString())
          .then(function(r) { return r.json(); })
          .then(function(deep) {
            if (!deep.ok || !deep.dollarOpportunity) return;
            var sec = document.getElementById('deepAuditSection');
            if (!sec) return;
            var dhtml = '';
            var opp = deep.dollarOpportunity;
            if (opp.monthly.high > 0) {
              dhtml += '<div class="report-section" style="background:rgba(255,166,87,0.06);border:1px solid rgba(255,166,87,0.2);border-radius:14px;padding:1.5rem;margin-bottom:2rem;">';
              dhtml += '<h2 style="color:#ffa657;border:none;padding:0;margin-bottom:0.5rem;">💰 Estimated Revenue You\'re Missing</h2>';
              dhtml += '<p style="font-size:1.3rem;font-weight:700;margin:0 0 0.3rem;">$' + opp.monthly.low + ' – $' + opp.monthly.high + ' per month</p>';
              dhtml += '<p style="color:var(--muted);font-size:0.88rem;margin:0;">That\'s approximately $' + opp.annual.low.toLocaleString() + ' – $' + opp.annual.high.toLocaleString() + ' per year in leads going to competitors instead of you.</p>';
              dhtml += '</div>';
            }
            // Deep findings
            var findings = deep.topFiveFindings || [];
            if (findings.length) {
              dhtml += '<div class="report-section">';
              dhtml += '<h2>Detailed Technical Findings</h2>';
              findings.forEach(function(f) {
                var sev = f.severity === 'high' ? 'fix' : (f.severity === 'medium' ? 'warn' : 'pass');
                var dollarNote = f.dollarImpact && f.dollarImpact.monthly.high > 0 ? ' (~$' + f.dollarImpact.monthly.low + '-$' + f.dollarImpact.monthly.high + '/mo impact)' : '';
                dhtml += '<div class="finding"><span class="finding-status ' + sev + '">' + (sev === 'fix' ? '✗ Fix' : (sev === 'warn' ? '⚠ Improve' : '✓ OK')) + '</span>';
                dhtml += '<span class="finding-text">' + esc(f.title || '') + '</span>';
                dhtml += '<div class="finding-impact">' + esc(f.detail || '') + dollarNote + '</div></div>';
              });
              dhtml += '</div>';
            }
            sec.innerHTML = dhtml;
          })
          .catch(function() { /* silent fail for deep audit */ });
      }
    }

    function computeOverall(scores) {
      var vals = [scores.seo, scores.localPresence, scores.aiVisibility, scores.technical, scores.reputation, scores.conversionUx].filter(function(v) { return typeof v === 'number'; });
      if (!vals.length) return 0;
      return Math.round(vals.reduce(function(a, b) { return a + b; }, 0) / vals.length);
    }

    function gradeFromScore(s) {
      if (mode === 'market') {
        if (s >= 80) return { label: 'Highly competitive market — strong players dominate', cls: 'bad' };
        if (s >= 55) return { label: 'Moderate competition — real opportunity exists for a strong new player', cls: 'ok' };
        return { label: 'Low competition — wide open for a business that shows up correctly', cls: 'good' };
      }
      if (s >= 80) return { label: 'Strong visibility — keep building on this foundation', cls: 'good' };
      if (s >= 55) return { label: 'Moderate visibility — customers are finding competitors before you', cls: 'ok' };
      return { label: 'Low visibility — you are likely invisible to most potential customers', cls: 'bad' };
    }

    function renderScoreRing(score) {
      var circ = 2 * Math.PI * 60;
      var offset = circ - (circ * score / 100);
      var color = score >= 80 ? '#00e5a0' : (score >= 55 ? '#ffa657' : '#ff6b6b');
      return '<div class="score-ring">' +
        '<svg viewBox="0 0 140 140"><circle class="bg" cx="70" cy="70" r="60"/><circle class="fg" cx="70" cy="70" r="60" style="stroke:' + color + ';stroke-dasharray:' + circ.toFixed(1) + ';stroke-dashoffset:' + offset.toFixed(1) + '"/></svg>' +
        '<div class="score-label"><span class="score-num">' + score + '</span><span class="score-of">out of 100</span></div></div>';
    }

    function catScore(val, label, hint) {
      var v = typeof val === 'number' ? val : 0;
      var color = v >= 70 ? 'var(--brand)' : (v >= 45 ? '#ffa657' : '#ff6b6b');
      var hintHtml = hint ? '<div style="font-size:0.65rem;color:var(--muted);margin-top:0.15rem;opacity:0.7;">' + esc(hint) + '</div>' : '';
      return '<div class="cat-score"><div class="cat-val" style="color:' + color + '">' + v + '</div><div class="cat-label">' + esc(label) + '</div>' + hintHtml + '</div>';
    }

    function renderFindings(scores, issues, searchPos) {
      var html = '';

      if (mode === 'market') {
        // Market mode: show industry state, not "your business" language
        var competitive = (scores.seo || 0) >= 60;
        html += finding(competitive ? 'warn' : 'pass',
          competitive
            ? 'This market has established competitors with strong search presence.'
            : 'This market has weak search competition — there is room to dominate.',
          competitive
            ? 'Existing businesses are actively investing in visibility. A new entrant needs differentiation to break in.'
            : 'Most businesses in this space are not optimizing their online presence. A well-positioned business can quickly take the top spots.'
        );

        var localStrong = (scores.localPresence || 0) >= 60;
        html += finding(localStrong ? 'warn' : 'pass',
          localStrong
            ? 'Local businesses are showing up in Maps and local results.'
            : 'Few businesses are properly set up for Google Maps and local search.',
          localStrong
            ? 'The top 3 Google Maps spots are held by strong competitors. Winning them requires great reviews, accurate business info, and local content.'
            : 'The top Google Maps spots are wide open. A business with a complete Google Business Profile and good reviews can claim them quickly.'
        );

        var dirHeavy = (scores.conversionUx || 0) >= 40;
        html += finding(dirHeavy ? 'warn' : 'pass',
          dirHeavy
            ? 'Directories (Yelp, Angi, etc.) take up most of the Google results in this market.'
            : 'Directories have minimal presence — standalone business websites can rank directly.',
          dirHeavy
            ? 'When directories dominate, it means local businesses haven\'t built strong enough websites to outrank them. This is an opportunity.'
            : 'Customers searching this industry are more likely to land on actual business websites rather than directory listings.'
        );

        var aiReady = (scores.aiVisibility || 0) >= 50;
        html += finding(aiReady ? 'pass' : 'fix',
          aiReady
            ? 'Some businesses in this market are set up for AI search recommendations.'
            : 'Almost no businesses in this market are optimized for AI search (ChatGPT, Google AI).',
          aiReady
            ? 'Early movers are positioning for AI citations. Matching their approach is important.'
            : 'This is a major opportunity. The first business to properly structure content for AI recommendations will have a significant advantage.'
        );

        return html;
      }

      // Website mode: original "your business" language
      var googleOk = (scores.seo || 0) >= 65 && (scores.localPresence || 0) >= 60;
      html += finding(googleOk ? 'pass' : 'fix',
        googleOk
          ? 'Your business shows up in Google Search for relevant queries.'
          : 'Your business is hard to find in Google Search for what you do.',
        googleOk
          ? 'Customers searching for your services can find you, but there is room to rank higher.'
          : 'When potential customers search for your type of service, they are finding your competitors instead of you.'
      );

      // Local/Maps presence
      var localOk = (scores.localPresence || 0) >= 65;
      html += finding(localOk ? 'pass' : 'fix',
        localOk
          ? 'Your local presence (Maps, directories) is reasonably strong.'
          : 'Your business is not showing up well in Google Maps and local results.',
        localOk
          ? 'People searching "near me" have a decent chance of finding you.'
          : 'When someone searches "near me" or in your city, competitors are showing up first. This means lost phone calls and lost jobs.'
      );

      // Directory/citation
      var dirOk = (scores.reputation || 0) >= 60 && (scores.localPresence || 0) >= 55;
      html += finding(dirOk ? 'pass' : 'warn',
        dirOk
          ? 'Your business information appears consistent across major directories.'
          : 'Your directory and citation presence needs attention.',
        dirOk
          ? 'Consistent info across directories helps Google trust your business location.'
          : 'Inconsistent or missing business info across directories makes it harder for Google to trust and show your business.'
      );

      // Technical SEO
      var techOk = (scores.technical || 0) >= 70;
      html += finding(techOk ? 'pass' : 'fix',
        techOk
          ? 'Your website technical foundation is solid.'
          : 'Your website has technical issues that reduce your visibility.',
        techOk
          ? 'Search engines can read and understand your site without major problems.'
          : 'Technical problems on your website make it harder for Google to understand and show your business to searchers.'
      );

      // AI discoverability
      var aiOk = (scores.aiVisibility || 0) >= 60;
      html += finding(aiOk ? 'pass' : 'fix',
        aiOk
          ? 'Your business information is structured for AI search systems.'
          : 'AI search tools (ChatGPT, Google AI) are unlikely to recommend your business.',
        aiOk
          ? 'When people ask AI for recommendations in your area, you have a chance of being mentioned.'
          : 'When customers ask AI "who is the best ' + esc(industry || 'service provider') + ' near me?" — your business is not set up to be the answer.'
      );

      return html;
    }

    function finding(status, text, impact) {
      return '<div class="finding"><span class="finding-status ' + status + '">' + (status === 'pass' ? '✓ Good' : (status === 'warn' ? '⚠ Needs Work' : '✗ Problem')) + '</span><span class="finding-text">' + esc(text) + '</span><div class="finding-impact">' + esc(impact) + '</div></div>';
    }

    function renderFix(num, fix) {
      var plain = translateFix(fix);
      return '<div class="fix-card"><div class="fix-num">Fix #' + num + '</div><div class="fix-title">' + esc(plain.title) + '</div><div class="fix-desc">' + esc(plain.desc) + '</div></div>';
    }

    function translateFix(fix) {

      // Market/strategy-specific translations (checked first for market mode fixes)

        'map pack control': { t: 'Get into the top Google Maps results', d: 'The top 3 spots in Google Maps get the most calls. Build up your reviews and keep your business info accurate to claim one of those spots.' },

        'market positioning': { t: 'Stand out from existing competitors', d: 'Create a clear offer that\'s different from what the current top businesses are saying. Give customers a reason to choose you specifically.' },
        'defensive growth': { t: 'Protect your rankings once you get them', d: 'Keep your content fresh and your reviews coming in so competitors can\'t push you back down after you start ranking.' },
        'brand recall': { t: 'Make customers remember your name', d: 'Use consistent messaging across all your listings so people see your business repeatedly and remember you when they\'re ready to buy.' },
        'high-conversion': { t: 'Create an offer that gets people to call', d: 'Your website needs a clear, compelling reason for someone to pick up the phone or fill out a form right now.' },
        'proof and authority': { t: 'Build trust that beats weaker competitors', d: 'Show reviews, credentials, before/after photos, and clear results. Businesses with more proof win more customers even if they rank lower.' }
      };

      var combined = (title + ' ' + desc).toLowerCase();

      for (var mkey in marketTranslations) {

      // Translate technical jargon into business impact
      var translations = {

        'robots': { t: 'Remove a barrier blocking search engines', d: 'A configuration issue may be preventing search engines from properly reading and showing your website.' },
        'meta description': { t: 'Improve how your business appears in search results', d: 'The preview text shown in Google results is missing or too short, making searchers less likely to click on your listing.' },
        'h1': { t: 'Clarify what your page is about', d: 'Your main page heading is missing or unclear, making it harder for both customers and search engines to understand what you offer.' },
        'image alt': { t: 'Make your images work harder for you', d: 'Images on your site are missing descriptions, which means search engines can\'t use them to help people find you.' },
        'sitemap': { t: 'Help search engines find all your pages', d: 'A sitemap tells Google about every page on your site. Without one, some of your pages may never appear in search results.' },
        'local': { t: 'Strengthen your local presence signals', d: 'Your website doesn\'t clearly communicate where you are and what areas you serve, making it harder to show up in local searches.' },
        'thin content': { t: 'Add more useful information to your website', d: 'Your website doesn\'t have enough content for Google to consider it a helpful resource. More detail about your services builds trust with both customers and search engines.' },
        'trust': { t: 'Build more credibility on your website', d: 'Your site is missing trust signals like reviews, credentials, and clear contact info that make visitors confident enough to call.' },
        'faq': { t: 'Answer the questions customers are asking', d: 'Adding a FAQ section helps you show up when people search with questions, and makes AI tools more likely to recommend you.' },
        'grammar': { t: 'Fix writing issues that hurt credibility', d: 'Spelling and grammar errors make your business look less professional and can reduce trust with potential customers.' }
      };

      for (var key in translations) {
        if (combined.indexOf(key) !== -1) {
          return { title: translations[key].t, desc: translations[key].d };

      // Fallback: use the fix as-is but clean up jargon

    function renderCompetitors(comps, yourScore) {
      var colHeader = mode === 'market' ? 'Key Strengths' : 'Where They Beat You';
      var html = '<table class="competitor-table"><thead><tr><th>Business</th><th>Visibility</th><th>' + colHeader + '</th></tr></thead><tbody>';
      for (var i = 0; i < comps.length; i++) {
        var c = comps[i];
        var strength = c.strengthScore || c.scoreSummary && c.scoreSummary.seo || 50;
        var barW = Math.max(10, Math.min(100, strength));
        var advantage = getAdvantage(c, yourScore);
        html += '<tr><td><strong>' + esc(c.companyName || c.name || c.domain || 'Competitor ' + (i+1)) + '</strong></td>';
        html += '<td><span class="strength-bar" style="width:' + barW + 'px"></span> ' + strength + '/100</td>';
        html += '<td style="font-size:0.82rem;color:var(--muted)">' + esc(advantage) + '</td></tr>';
      }
      html += '</tbody></table>';
      if (mode === 'market') {
        html += '<p style="font-size:0.82rem;color:var(--muted);margin-top:0.75rem;">These are the current market leaders. A new or existing business that addresses the gaps above can compete with or surpass them.</p>';
      } else {
        html += '<p style="font-size:0.82rem;color:var(--muted);margin-top:0.75rem;">These competitors are capturing customers that could be yours. The fixes above will help you close the gap.</p>';
      }
      return html;
    }

    function getAdvantage(comp, yourScore) {
      var dominated = [];
      if ((comp.searchAppearances || 0) > 1) dominated.push('shows up more often in search');
      if ((comp.mapPackAppearances || 0) > 0) dominated.push('appears in Google Maps');
      if ((comp.hasStructuredData)) dominated.push('better set up for AI search');
      if ((comp.reputationScore || 0) > 70) dominated.push('stronger review presence');
      if ((comp.strengthScore || 0) > yourScore + 10) dominated.push('higher overall visibility');
      if (!dominated.length) dominated.push('similar visibility level');
      return dominated.slice(0, 2).join(', ');
    }
  })();
  </script>
</body>
</html>

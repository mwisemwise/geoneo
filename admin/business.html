<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Business Deep View | GeoNeo Admin</title>
  <meta name="robots" content="noindex" />
  <link rel="stylesheet" href="/styles.css" />
  <style>
    .admin-layout { display: flex; min-height: calc(100vh - 60px); }
    .admin-sidebar { width: 200px; border-right: 1px solid var(--line); padding: 1.5rem 0.75rem; display: flex; flex-direction: column; gap: 0.25rem; position: sticky; top: 60px; height: calc(100vh - 60px); }
    .admin-sidebar a { display: flex; align-items: center; gap: 0.5rem; padding: 0.55rem 0.75rem; border-radius: 8px; font-size: 0.85rem; color: var(--muted); text-decoration: none; transition: all 0.15s; }
    .admin-sidebar a:hover { background: rgba(0,229,160,0.06); color: var(--ink); }
    .admin-sidebar a.active { background: rgba(0,229,160,0.1); color: var(--brand); font-weight: 600; }
    .admin-sidebar .icon { font-size: 1rem; width: 1.2rem; text-align: center; }
    @media (max-width: 768px) { .admin-sidebar { display: none; } }
    .admin-wrap { max-width: 960px; margin: 0 auto; padding: 1.5rem 1rem; flex: 1; }
    .input-bar { display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 1rem; padding: 1rem; border: 1px solid var(--line); border-radius: 12px; background: var(--surface); }
    .input-bar input { border: 1.5px solid var(--line); background: var(--bg); color: var(--ink); padding: 0.55rem 0.7rem; border-radius: 8px; font-family: inherit; font-size: 0.88rem; }
    .input-bar input[name="url"] { flex: 2; min-width: 180px; }
    .input-bar input:not([name="url"]) { width: 100px; }
    .input-bar button { border: none; background: var(--brand); color: #0a0f1a; font-weight: 700; padding: 0.55rem 1rem; border-radius: 8px; cursor: pointer; font-family: inherit; font-size: 0.85rem; }
    .saved-bar { display: flex; gap: 0.5rem; align-items: center; margin-bottom: 1.5rem; flex-wrap: wrap; }
    .saved-bar select { border: 1.5px solid var(--line); background: var(--surface); color: var(--ink); padding: 0.5rem; border-radius: 8px; font-family: inherit; font-size: 0.85rem; min-width: 200px; }
    .saved-bar button { border: 1px solid var(--line); background: var(--bg); color: var(--ink); padding: 0.4rem 0.8rem; border-radius: 6px; font-size: 0.8rem; cursor: pointer; font-family: inherit; }
    .saved-bar .save-btn { background: var(--brand); color: #0a0f1a; border-color: var(--brand); font-weight: 600; }
    .status { padding: 0.6rem 0.8rem; border-radius: 8px; margin-bottom: 1rem; font-size: 0.85rem; display: none; }
    .status.active { display: block; background: rgba(0,229,160,0.08); border: 1px solid rgba(0,229,160,0.2); }
    .status.active::before { content: ''; display: inline-block; width: 14px; height: 14px; border: 2px solid var(--brand); border-top-color: transparent; border-radius: 50%; animation: spin 0.7s linear infinite; margin-right: 0.5rem; vertical-align: middle; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .status.error { display: block; background: rgba(255,107,107,0.08); border: 1px solid rgba(255,107,107,0.2); color: #ff6b6b; }
    .tabs { display: flex; gap: 0; border-bottom: 2px solid var(--line); margin-bottom: 1.5rem; }
    .tabs button { border: none; background: none; color: var(--muted); padding: 0.6rem 1.2rem; font-family: inherit; font-size: 0.88rem; font-weight: 600; cursor: pointer; border-bottom: 2px solid transparent; margin-bottom: -2px; }
    .tabs button.active { color: var(--brand); border-bottom-color: var(--brand); }
    .tab-panel { display: none; }
    .tab-panel.active { display: block; }
    .score-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 0.5rem; margin-bottom: 1.5rem; }
    .score-box { background: var(--surface); border: 1px solid var(--line); border-radius: 10px; padding: 0.6rem; text-align: center; }
    .score-box .val { font-family: 'Space Grotesk'; font-size: 1.4rem; font-weight: 700; }
    .score-box .val.good { color: var(--brand); }
    .score-box .val.ok { color: #ffa657; }
    .score-box .val.bad { color: #ff6b6b; }
    .score-box .lbl { font-size: 0.7rem; color: var(--muted); }
    .section-title { font-size: 1rem; font-weight: 700; margin: 1.5rem 0 0.75rem; padding-bottom: 0.4rem; border-bottom: 1px solid var(--line); }
    .check-list { list-style: none; padding: 0; margin: 0; }
    .check-list li { padding: 0.35rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.82rem; }
    .check-list .pass { color: var(--brand); }
    .check-list .fix { color: #ff6b6b; }
    .comp-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    .comp-table th { text-align: left; padding: 0.5rem 0.4rem; border-bottom: 2px solid var(--line); color: var(--muted); font-size: 0.72rem; text-transform: uppercase; }
    .comp-table td { padding: 0.5rem 0.4rem; border-bottom: 1px solid rgba(255,255,255,0.03); }
    .comp-table .self { color: var(--brand); font-weight: 600; }
    .revenue-banner { background: rgba(255,166,87,0.08); border: 1px solid rgba(255,166,87,0.2); border-radius: 12px; padding: 1rem; margin-bottom: 1.5rem; }
    .revenue-banner .amount { font-size: 1.3rem; font-weight: 700; color: #ffa657; }
    .revenue-banner p { color: var(--muted); font-size: 0.82rem; margin: 0.2rem 0 0; }
    .email-box { background: var(--bg); border: 1px solid var(--line); border-radius: 10px; padding: 1rem; font-size: 0.82rem; white-space: pre-wrap; max-height: 400px; overflow-y: auto; }
    .btn-row { display: flex; gap: 0.5rem; margin-top: 0.75rem; }
    .btn-row button { border: none; padding: 0.45rem 0.9rem; border-radius: 8px; cursor: pointer; font-family: inherit; font-weight: 600; font-size: 0.8rem; }
    .btn-row .primary { background: var(--brand); color: #0a0f1a; }
    .btn-row .secondary { background: var(--line); color: var(--ink); }
    .metric-row { display: flex; justify-content: space-between; align-items: center; padding: 0.5rem 0; border-bottom: 1px solid rgba(255,255,255,0.03); font-size: 0.85rem; }
    .metric-row .label { color: var(--muted); }
    .metric-row .value { font-weight: 600; }
    .metric-row .value.good { color: var(--brand); }
    .metric-row .value.ok { color: #ffa657; }
    .metric-row .value.bad { color: #ff6b6b; }
  </style>
</head>
<body>
  <header class="site-header container">
    <a class="brand" href="/admin/index.html"><span class="brand-mark">G</span><span class="brand-text">GeoNeo Admin</span></a>
    <a href="/admin/index.html" style="color:var(--muted);font-size:0.85rem;">← Back</a>
  </header>
  <div class="admin-layout">
    <nav class="admin-sidebar">
      <a href="/admin/index.html"><span class="icon">🏠</span> Dashboard</a>
      <a href="/admin/area.html"><span class="icon">📍</span> Branson Area</a>
      <a href="/admin/audits.html"><span class="icon">📋</span> All Audits</a>
      <a href="/admin/business.html" class="active"><span class="icon">🔍</span> Deep View</a>
      <a href="/admin/prospect.html"><span class="icon">🎯</span> Prospects</a>
      <a href="/admin/leads"><span class="icon">📊</span> Leads</a>
    </nav>
  <main class="admin-wrap">
    <h1 style="margin-bottom:0.5rem;">🔍 Business Deep View</h1>

    <div class="saved-bar">
      <select id="savedSelect"><option value="">— Load saved client —</option></select>
      <button id="loadBtn">Load</button>
      <button class="save-btn" id="saveBtn" disabled>💾 Save This Audit</button>
      <button id="deleteBtn" style="color:#ff6b6b">🗑</button>
    </div>

    <form class="input-bar" id="auditForm">
      <input type="text" name="url" placeholder="Website URL" required />
      <input type="text" name="industry" placeholder="Industry" />
      <input type="text" name="city" placeholder="City" />
      <input type="text" name="state" placeholder="ST" maxlength="2" />
      <button type="submit">Run Full Audit</button>
    </form>

    <div class="status" id="status"></div>

    <div id="resultArea" style="display:none;">
      <div class="tabs" id="tabBar">
        <button class="active" data-tab="overview">Overview</button>
        <button data-tab="metrics">Deep Metrics</button>
        <button data-tab="rankings">Rankings</button>
        <button data-tab="email">📧 Email</button>
      </div>

      <div class="tab-panel active" id="panel-overview"></div>
      <div class="tab-panel" id="panel-metrics"></div>
      <div class="tab-panel" id="panel-rankings"></div>
      <div class="tab-panel" id="panel-email"></div>
    </div>
  </main>
  </div>
  <script>
  (function() {
    var form = document.getElementById('auditForm');
    var statusEl = document.getElementById('status');
    var resultArea = document.getElementById('resultArea');
    var saveBtn = document.getElementById('saveBtn');
    var loadBtn = document.getElementById('loadBtn');
    var deleteBtn = document.getElementById('deleteBtn');
    var savedSelect = document.getElementById('savedSelect');
    var currentData = null;
    var STORAGE_KEY = 'geoneo_saved_clients';

    // Tab switching
    document.getElementById('tabBar').addEventListener('click', function(e) {
      if (e.target.tagName !== 'BUTTON') return;
      document.querySelectorAll('.tabs button').forEach(function(b) { b.classList.remove('active'); });
      document.querySelectorAll('.tab-panel').forEach(function(p) { p.classList.remove('active'); });
      e.target.classList.add('active');
      document.getElementById('panel-' + e.target.dataset.tab).classList.add('active');
    });

    // Load saved clients into dropdown
    function loadSavedList() {
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      savedSelect.innerHTML = '<option value="">— Load saved client (' + saved.length + ') —</option>';
      saved.forEach(function(s, i) { savedSelect.innerHTML += '<option value="' + i + '">' + esc(s.name || s.url) + ' (' + (s.date || '') + ')</option>'; });
    }
    loadSavedList();

    // Save
    saveBtn.addEventListener('click', function() {
      if (!currentData) return;
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      var entry = { name: currentData.audit?.siteProfile?.businessName || form.url.value, url: form.url.value, industry: form.industry.value, city: form.city.value, state: form.state.value, date: new Date().toISOString().slice(0,10), data: currentData };
      saved.unshift(entry);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      loadSavedList();
      alert('Saved!');
    });

    // Load
    loadBtn.addEventListener('click', function() {
      var idx = savedSelect.value;
      if (idx === '') return;
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      var entry = saved[idx];
      if (!entry) return;
      form.url.value = entry.url || '';
      form.industry.value = entry.industry || '';
      form.city.value = entry.city || '';
      form.state.value = entry.state || '';
      currentData = entry.data;
      renderResults(currentData);
    });

    // Delete
    deleteBtn.addEventListener('click', function() {
      var idx = savedSelect.value;
      if (idx === '') return;
      if (!confirm('Delete this saved client?')) return;
      var saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
      saved.splice(idx, 1);
      localStorage.setItem(STORAGE_KEY, JSON.stringify(saved));
      loadSavedList();
    });

    // Pre-fill from URL params
    var params = new URLSearchParams(window.location.search);
    if (params.get('url')) form.url.value = params.get('url');
    if (params.get('industry')) form.industry.value = params.get('industry');
    if (params.get('city')) form.city.value = params.get('city');
    if (params.get('state')) form.state.value = params.get('state');
    if (params.get('url')) runAudit();

    form.addEventListener('submit', function(e) { e.preventDefault(); runAudit(); });

    function runAudit() {
      var url = form.url.value.trim();
      if (!url) return;
      statusEl.className = 'status active';
      statusEl.textContent = 'Running full audit + deep analysis + market context...';
      resultArea.style.display = 'none';
      saveBtn.disabled = true;

      var p = new URLSearchParams({ url: url, industry: form.industry.value.trim(), city: form.city.value.trim(), state: form.state.value.trim() });
      fetch('/api/admin/business?' + p.toString())
        .then(function(r) { return r.json(); })
        .then(function(data) {
          if (data.error) { statusEl.className = 'status error'; statusEl.textContent = data.error; return; }
          statusEl.style.display = 'none';
          currentData = data;
          saveBtn.disabled = false;
          renderResults(data);
        })
        .catch(function(err) { statusEl.className = 'status error'; statusEl.textContent = err.message; });
    }

    function renderResults(data) {
      resultArea.style.display = 'block';
      renderOverview(data);
      renderMetrics(data);
      renderRankings(data);
      renderEmail(data);
    }

    function renderOverview(data) {
      var audit = data.audit || {};
      var deep = data.deep || {};
      var dollar = data.dollarLoss || {};
      var scores = audit.scores || {};
      var html = '';

      if (dollar.low || dollar.high) {
        html += '<div class="revenue-banner"><div class="amount">💰 $' + dollar.low + '–$' + dollar.high + '/month lost</div><p>≈ $' + (dollar.low*12) + '–$' + (dollar.high*12) + '/year going to competitors</p></div>';
      }

      html += '<div class="score-grid">';
      html += scoreBox(scores.overall, 'Overall');
      html += scoreBox(scores.seo, 'SEO');
      html += scoreBox(scores.geo, 'Local');
      html += scoreBox(scores.ai, 'AI');
      if (audit.googleGrades) {
        html += scoreBox(audit.googleGrades.performance, 'Speed');
        html += scoreBox(audit.googleGrades.seo, 'G-SEO');
        html += scoreBox(audit.googleGrades.accessibility, 'A11y');
        html += scoreBox(audit.googleGrades.bestPractices, 'Best Pr.');
      }
      html += '</div>';

      // Site profile
      var sp = audit.siteProfile || {};
      if (sp.businessName) {
        html += '<div class="section-title">Business Profile</div>';
        html += metric('Business Name', sp.businessName);
        html += metric('Platform/Builder', sp.platform || 'Unknown');
        html += metric('Title', sp.title);
        html += metric('H1', sp.h1);
        html += metric('Phone', sp.contactSignals?.phone ? '✓' : '✗', sp.contactSignals?.phone);
        html += metric('Email', sp.contactSignals?.email ? '✓' : '✗', sp.contactSignals?.email);
        html += metric('Address', sp.contactSignals?.address ? '✓' : '✗', sp.contactSignals?.address);
        html += metric('Internal Links', sp.internalLinks?.count || 0);
        html += metric('Trust Level', sp.trustSignals?.level || '–');
      }

      // Summary
      html += '<div class="section-title">Summary</div>';
      html += '<p style="font-size:0.88rem;color:var(--muted)">' + esc(audit.summary || '') + '</p>';

      // Top fixes
      if (audit.topFixes && audit.topFixes.length) {
        html += '<div class="section-title">Top Fixes</div><ul class="check-list">';
        audit.topFixes.forEach(function(f, i) { html += '<li><span class="fix">' + (i+1) + '.</span> ' + esc(f) + '</li>'; });
        html += '</ul>';
      }

      document.getElementById('panel-overview').innerHTML = html;
    }

    function renderMetrics(data) {
      var audit = data.audit || {};
      var deep = data.deep || {};
      var html = '';

      // Deep scores
      if (deep.sectionScores) {
        html += '<div class="section-title">Deep Analysis Scores</div><div class="score-grid">';
        html += scoreBox(deep.sectionScores.nap, 'NAP');
        html += scoreBox(deep.sectionScores.sitemap, 'Sitemap');
        html += scoreBox(deep.sectionScores.images, 'Images');
        html += scoreBox(deep.overallScore, 'Deep Total');
        html += '</div>';
      }

      // All checks
      if (audit.checks && audit.checks.length) {
        html += '<div class="section-title">All Checks (' + audit.checks.length + ')</div><ul class="check-list">';
        audit.checks.forEach(function(c) {
          html += '<li><span class="' + (c.status === 'PASS' ? 'pass' : 'fix') + '">' + (c.status === 'PASS' ? '✓' : '✗') + '</span> <strong>' + esc(c.key) + ':</strong> ' + esc(c.message) + '</li>';
        });
        html += '</ul>';
      }

      // Deep findings with $$
      if (deep.topFiveFindings && deep.topFiveFindings.length) {
        html += '<div class="section-title">Deep Findings (with $$ impact)</div><ul class="check-list">';
        deep.topFiveFindings.forEach(function(f) {
          var d = f.dollarImpact ? ' <span style="color:#ffa657">~$' + f.dollarImpact.monthly.low + '-$' + f.dollarImpact.monthly.high + '/mo</span>' : '';
          html += '<li><span class="fix">✗</span> <strong>' + esc(f.key || '') + ':</strong> ' + esc(f.title || '') + d + '<br><span style="color:var(--muted);font-size:0.78rem">' + esc(f.detail || '') + '</span></li>';
        });
        html += '</ul>';
      }

      // NAP details
      if (deep.sections && deep.sections.nap && deep.sections.nap.extracted) {
        var nap = deep.sections.nap;
        html += '<div class="section-title">NAP Details</div>';
        html += metric('Phones Found', (nap.extracted.phones || []).join(', ') || 'None');
        html += metric('Addresses Found', (nap.extracted.addresses || []).join(', ') || 'None');
        html += metric('Phone Variants', nap.consistency?.phoneVariants || 0);
        html += metric('Address Variants', nap.consistency?.addressVariants || 0);
      }

      // Sitemap details
      if (deep.sections && deep.sections.sitemap) {
        var sm = deep.sections.sitemap;
        html += '<div class="section-title">Sitemap Details</div>';
        html += metric('Type', sm.type || 'none');
        html += metric('URLs', sm.urlCount || 0);
        html += metric('Has Sitemap Directive in robots.txt', sm.robotsHasSitemapDirective ? '✓' : '✗', sm.robotsHasSitemapDirective);
      }

      // Image details
      if (deep.sections && deep.sections.images) {
        var img = deep.sections.images;
        html += '<div class="section-title">Image Audit</div>';
        html += metric('Total Images', img.total || 0);
        if (img.altQuality) {
          html += metric('Alt: Good', img.altQuality.good || 0);
          html += metric('Alt: Missing', img.altQuality.missing || 0, !(img.altQuality.missing));
          html += metric('Alt: Poor/Stuffed', (img.altQuality.poor || 0) + (img.altQuality.stuffed || 0));
        }
        html += metric('Modern Formats', img.formats?.modern || 0);
        html += metric('Legacy Formats', img.formats?.legacy || 0);
        html += metric('Lazy Loaded', img.lazyLoaded || 0);
        html += metric('Missing Dimensions (CLS risk)', img.missingDimensions || 0);
      }

      document.getElementById('panel-metrics').innerHTML = html;
    }

    function renderRankings(data) {
      var market = data.market || {};
      var audit = data.audit || {};
      var comps = market.competitors || [];
      var html = '';

      if (!comps.length) {
        html = '<p style="color:var(--muted)">No market data available. Add industry + city and re-run to see rankings.</p>';
        document.getElementById('panel-rankings').innerHTML = html;
        return;
      }

      var mScores = market.summaryScores || {};
      html += '<div class="score-grid">';
      html += scoreBox(mScores.competitionLevel, 'Competition');
      html += scoreBox(mScores.localBusinessVisibility, 'Local Vis.');
      html += scoreBox(mScores.opportunityScore, 'Opportunity');
      html += scoreBox(mScores.leadPotential, 'Lead Potential');
      html += '</div>';

      html += '<div class="section-title">Market Leaderboard (' + comps.length + ' businesses)</div>';
      html += '<table class="comp-table"><thead><tr><th>#</th><th>Business</th><th>Domain</th><th>Strength</th><th>Search</th><th>Maps</th></tr></thead><tbody>';
      comps.slice(0, 15).forEach(function(c, i) {
        var isSelf = audit.finalUrl && c.domain && audit.finalUrl.indexOf(c.domain) !== -1;
        var cls = isSelf ? ' class="self"' : '';
        html += '<tr' + cls + '><td>' + (i+1) + '</td><td>' + esc(c.companyName || c.domain) + (isSelf ? ' ⭐' : '') + '</td><td>' + esc(c.domain || '') + '</td><td>' + (c.strengthScore || '–') + '</td><td>' + (c.searchAppearances || 0) + '</td><td>' + (c.mapPackAppearances || 0) + '</td></tr>';
      });
      html += '</tbody></table>';

      document.getElementById('panel-rankings').innerHTML = html;
    }

    function renderEmail(data) {
      var audit = data.audit || {};
      var dollar = data.dollarLoss || {};
      var name = audit.siteProfile?.businessName || form.url.value;
      var score = audit.scores?.overall || '?';
      var fixes = (audit.topFixes || []).slice(0, 3);
      var fixList = fixes.length ? fixes.map(function(f, i) { return (i+1) + '. ' + f; }).join('\n') : '1. Visibility issues reducing your reach\n2. Missing local signals\n3. Not optimized for AI search';
      var revLine = dollar.high ? '\n\n💰 ESTIMATED REVENUE IMPACT:\nBased on your industry and location, we estimate these issues are costing you approximately $' + dollar.low + '–$' + dollar.high + ' per month ($' + (dollar.low*12) + '–$' + (dollar.high*12) + '/year) in customers going to competitors.' : '';

      var email = 'Subject: Free visibility audit for ' + name + ' — ' + score + '/100\n\n'
        + 'Hi,\n\n'
        + 'I was researching ' + (form.industry.value || 'businesses') + ' in ' + (form.city.value || 'your area') + ' and ran a free visibility audit on your website (' + form.url.value + ').\n\n'
        + '📊 YOUR SCORE: ' + score + '/100\n\n'
        + '🔍 TOP ISSUES:\n' + fixList
        + revLine
        + '\n\n🏆 YOUR COMPETITION:\nOther businesses in your area are outranking you in Google Search, Maps, and AI recommendations.\n\n'
        + '---\n\n'
        + 'I\'d be happy to send you the full detailed report — no cost, no strings.\n\nIf you\'d like help fixing these issues, we can do that too. Most fixes take 1-2 weeks and results show within 30 days.\n\n'
        + 'Want me to send the full report?\n\n'
        + 'Best,\nMatt\nGeoNeo AI\nhello@geoneo.ai';

      var html = '<div class="email-box" id="emailBox">' + esc(email) + '</div>';
      html += '<div class="btn-row"><button class="primary" id="copyBtn">📋 Copy Email</button><button class="secondary" id="jsonBtn">Export JSON</button></div>';
      document.getElementById('panel-email').innerHTML = html;

      document.getElementById('copyBtn').addEventListener('click', function() {
        navigator.clipboard.writeText(document.getElementById('emailBox').textContent);
        this.textContent = '✓ Copied!'; setTimeout(function() { document.getElementById('copyBtn').textContent = '📋 Copy Email'; }, 2000);
      });
      document.getElementById('jsonBtn').addEventListener('click', function() {
        var blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
        var a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = 'audit-' + (form.url.value).replace(/[^a-z0-9]/gi, '-') + '.json'; a.click();
      });
    }

    function scoreBox(val, label) {
      var v = Number(val) || 0;
      var cls = v >= 70 ? 'good' : (v >= 45 ? 'ok' : 'bad');
      return '<div class="score-box"><div class="val ' + cls + '">' + (val || '–') + '</div><div class="lbl">' + label + '</div></div>';
    }
    function metric(label, value, isGood) {
      var cls = isGood === true ? 'good' : (isGood === false ? 'bad' : '');
      return '<div class="metric-row"><span class="label">' + esc(label) + '</span><span class="value ' + cls + '">' + esc(String(value)) + '</span></div>';
    }
    function esc(s) { var d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
  })();
  </script>
</body>
</html>
